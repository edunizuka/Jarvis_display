<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Jarvis Display</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200;300;400&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --card: rgba(255,255,255,0.82);
    --card-border: rgba(255,255,255,0.9);
    --text-main: #1c2b3a;
    --text-muted: #5f7080;
    --text-hint: #9aaab8;
    --accent: #4285f4;
    --accent2: #34a853;
    --shadow: 0 4px 24px rgba(60,80,120,0.10);
    --radius: 20px;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'Nunito Sans', sans-serif;
    background:
      radial-gradient(ellipse at 10% 20%, rgba(66,133,244,0.13) 0%, transparent 55%),
      radial-gradient(ellipse at 90% 80%, rgba(52,168,83,0.10) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 10%, rgba(251,188,5,0.08) 0%, transparent 45%),
      #eef2f7;
  }

  body {
    display: grid;
    grid-template-rows: auto 1fr auto;
    min-height: 100vh;
    padding: 28px 32px 20px;
    gap: 16px;
  }

  /* ── TOP ── */
  .top {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 24px;
  }

  .time {
    font-family: 'Nunito', sans-serif;
    font-size: clamp(90px, 15vw, 130px);
    font-weight: 200;
    color: var(--text-main);
    letter-spacing: -4px;
    line-height: 1;
    user-select: none;
  }
  .sep { animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0.15; } }

  .date-line {
    font-size: clamp(15px, 2vw, 19px);
    color: var(--text-muted);
    margin-top: 8px;
    font-weight: 400;
  }

  .meta-line {
    display: flex;
    gap: 18px;
    margin-top: 7px;
  }
  .meta-chip {
    font-size: 13px;
    color: var(--text-hint);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* Weather */
  .weather-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px 22px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    min-width: 130px;
    backdrop-filter: blur(12px);
  }
  .w-icon { font-size: 40px; line-height: 1; }
  .w-temp {
    font-family: 'Nunito', sans-serif;
    font-size: 34px;
    font-weight: 300;
    color: var(--text-main);
    margin-top: 4px;
  }
  .w-desc { font-size: 12px; color: var(--text-muted); text-align: center; line-height: 1.3; }
  .w-city { font-size: 11px; color: var(--text-hint); margin-top: 2px; }

  /* ── MIDDLE ── */
  .middle {
    display: grid;
    grid-template-columns: 1.8fr 1fr;
    gap: 14px;
    align-items: stretch;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px 20px;
    backdrop-filter: blur(12px);
    display: flex;
    flex-direction: column;
  }

  .card-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-hint);
    margin-bottom: 12px;
  }

  /* News */
  .news-list { display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .news-item {
    padding-left: 10px;
    border-left: 2.5px solid var(--accent);
  }
  .news-item:nth-child(2) { border-color: #34a853; }
  .news-item:nth-child(3) { border-color: #fbbc05; }
  .news-item:nth-child(4) { border-color: #ea4335; }
  .news-title {
    font-size: 13px;
    color: var(--text-main);
    line-height: 1.45;
  }
  .news-src { font-size: 10px; color: var(--text-hint); margin-top: 2px; }

  /* Forecast */
  .forecast-list {
    display: flex;
    flex-direction: column;
    gap: 9px;
    flex: 1;
    justify-content: space-around;
  }
  .fc-row {
    display: grid;
    grid-template-columns: 34px 24px 1fr;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  .fc-day { color: var(--text-muted); font-size: 12px; }
  .fc-icon { font-size: 18px; text-align: center; }
  .fc-max { font-weight: 600; color: var(--text-main); }
  .fc-min { color: var(--text-hint); font-size: 12px; }

  /* ── BOTTOM ── */
  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .jarvis-pill {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 40px;
    padding: 9px 18px;
    box-shadow: var(--shadow);
    font-size: 13px;
    color: var(--text-muted);
    backdrop-filter: blur(12px);
  }
  .pulse-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--accent2);
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(0.7); opacity: 0.4; }
  }
  .jarvis-pill strong { color: var(--accent); font-weight: 600; }
  .update-info { font-size: 11px; color: var(--text-hint); }

  /* Skeleton */
  .skeleton {
    height: 12px;
    border-radius: 6px;
    margin-bottom: 6px;
    background: linear-gradient(90deg, rgba(0,0,0,0.06) 25%, rgba(0,0,0,0.03) 50%, rgba(0,0,0,0.06) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
</style>
</head>
<body>

<!-- TOP -->
<div class="top">
  <div class="clock-wrap">
    <div class="time" id="clock">00<span class="sep">:</span>00</div>
    <div class="date-line" id="datestr">Cargando...</div>
    <div class="meta-line">
      <div class="meta-chip" id="chip-hum">💧 — humedad</div>
      <div class="meta-chip" id="chip-wind">💨 — km/h</div>
    </div>
  </div>
  <div class="weather-card">
    <div class="w-icon" id="w-icon">⛅</div>
    <div class="w-temp" id="w-temp">—°</div>
    <div class="w-desc" id="w-desc">Cargando...</div>
    <div class="w-city">Zaragoza</div>
  </div>
</div>

<!-- MIDDLE -->
<div class="middle">
  <div class="card">
    <div class="card-label">📰 Noticias</div>
    <div class="news-list" id="news-list">
      <div class="news-item"><div class="skeleton" style="width:90%"></div><div class="skeleton" style="width:55%"></div></div>
      <div class="news-item"><div class="skeleton" style="width:85%"></div><div class="skeleton" style="width:60%"></div></div>
      <div class="news-item"><div class="skeleton" style="width:80%"></div><div class="skeleton" style="width:50%"></div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-label">🌤 Próximos días</div>
    <div class="forecast-list" id="forecast-list">
      <div class="fc-row"><span class="fc-day">—</span><span class="fc-icon">—</span><span></span></div>
    </div>
  </div>
</div>

<!-- BOTTOM -->
<div class="bottom">
  <div></div>
  <div class="update-info" id="update-info">—</div>
</div>

<script>
const DIAS = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
const DAYS_SHORT = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
const W_ICONS = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'❄️',73:'❄️',75:'❄️',80:'🌦️',81:'🌧️',82:'⛈️',95:'⛈️',96:'⛈️',99:'⛈️'};
const W_DESC = {0:'Despejado',1:'Mayormente despejado',2:'Parcialmente nublado',3:'Nublado',45:'Niebla',48:'Niebla',51:'Llovizna ligera',53:'Llovizna',55:'Llovizna intensa',61:'Lluvia ligera',63:'Lluvia moderada',65:'Lluvia intensa',71:'Nieve ligera',73:'Nieve moderada',75:'Nieve intensa',80:'Chubascos',81:'Chubascos fuertes',82:'Chubascos violentos',95:'Tormenta',96:'Tormenta con granizo',99:'Tormenta fuerte'};

function tick() {
  const n = new Date();
  const h = String(n.getHours()).padStart(2,'0');
  const m = String(n.getMinutes()).padStart(2,'0');
  document.getElementById('clock').innerHTML = h + '<span class="sep">:</span>' + m;
  document.getElementById('datestr').textContent =
    DIAS[n.getDay()] + ', ' + n.getDate() + ' de ' + MESES[n.getMonth()] + ' de ' + n.getFullYear();
}
tick();
setInterval(tick, 1000);

async function loadWeather() {
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=41.6488&longitude=-0.8891&current=temperature_2m,weathercode,relativehumidity_2m,windspeed_10m&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Europe%2FMadrid&forecast_days=6');
    const d = await r.json();
    const cur = d.current;
    document.getElementById('w-icon').textContent = W_ICONS[cur.weathercode] || '🌡️';
    document.getElementById('w-temp').textContent = Math.round(cur.temperature_2m) + '°';
    document.getElementById('w-desc').textContent = W_DESC[cur.weathercode] || 'Variable';
    document.getElementById('chip-hum').textContent = '💧 ' + cur.relativehumidity_2m + '% humedad';
    document.getElementById('chip-wind').textContent = '💨 ' + Math.round(cur.windspeed_10m) + ' km/h';
    const daily = d.daily;
    let html = '';
    for (let i = 1; i <= 5; i++) {
      const dt = new Date(daily.time[i]);
      html += `<div class="fc-row">
        <span class="fc-day">${DAYS_SHORT[dt.getDay()]}</span>
        <span class="fc-icon">${W_ICONS[daily.weathercode[i]] || '🌡️'}</span>
        <span><span class="fc-max">${Math.round(daily.temperature_2m_max[i])}°</span> <span class="fc-min">/ ${Math.round(daily.temperature_2m_min[i])}°</span></span>
      </div>`;
    }
    document.getElementById('forecast-list').innerHTML = html;
  } catch(e) {
    document.getElementById('w-desc').textContent = 'Sin conexión';
  }
}
loadWeather();
setInterval(loadWeather, 30 * 60 * 1000);

const FEEDS = [
  { url: 'https://feeds.elpais.com/mrss-s/pages/ep/site/elpais.com/portada', name: 'El País' },
  { url: 'https://www.rtve.es/api/noticias.rss', name: 'RTVE' },
  { url: 'https://www.20minutos.es/rss/', name: '20 Minutos' },
  { url: 'https://www.elconfidencial.com/rss/portada.xml', name: 'El Confidencial' },
];
let fi = 0;

async function loadNews() {
  const feed = FEEDS[fi++ % FEEDS.length];
  try {
    const r = await fetch('https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(feed.url));
    const data = await r.json();
    if (data.status === 'ok' && data.items && data.items.length) {
      const colors = ['#4285f4', '#34a853', '#fbbc05', '#ea4335'];
      document.getElementById('news-list').innerHTML = data.items.slice(0, 4).map((item, i) => {
        const t = item.title.length > 85 ? item.title.substring(0, 85) + '…' : item.title;
        return `<div class="news-item" style="border-color:${colors[i]}">
          <div class="news-title">${t}</div>
          <div class="news-src">${feed.name}</div>
        </div>`;
      }).join('');
      const n = new Date();
      document.getElementById('update-info').textContent =
        'Actualizado ' + String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
    } else {
      throw new Error('vacío');
    }
  } catch(e) {
    if (fi < FEEDS.length * 2) setTimeout(loadNews, 3000);
    else document.getElementById('news-list').innerHTML =
      '<div class="news-item"><div class="news-title">Sin conexión o sin noticias disponibles.</div></div>';
  }
}
loadNews();
setInterval(loadNews, 10 * 60 * 1000);
</script>
</body>
</html>
